<svg width="200" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" stroke="#5568d3" stroke-width="3"/>
  
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Code Brackets Symbol -->
  <path d="M 60 60 L 45 80 L 45 120 L 60 140" 
        stroke="white" stroke-width="8" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <path d="M 140 60 L 155 80 L 155 120 L 140 140" 
        stroke="white" stroke-width="8" fill="none" 
        stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Slash in the middle -->
  <line x1="85" y1="130" x2="115" y2="70" 
        stroke="white" stroke-width="8" 
        stroke-linecap="round"/>
  
  <!-- Small decorative dots -->
  <circle cx="100" cy="45" r="4" fill="white"/>
  <circle cx="100" cy="155" r="4" fill="white"/>
  
  <!-- Company Initial "T" -->
  <text x="100" y="110" font-family="Arial, sans-serif" 
        font-size="50" font-weight="bold" 
        fill="white" text-anchor="middle" 
        dominant-baseline="middle" opacity="0.3">T</text>
</svg>